
<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>diaww Calculator - Edisi Premium</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-gradient: linear-gradient(135deg, #020617 0%, #0f172a 100%);
            --calc-bg: rgba(15, 23, 42, 0.85);
            --glass-border: rgba(255, 255, 255, 0.1);
            --btn-bg: rgba(255, 255, 255, 0.05);
            --btn-hover: rgba(255, 255, 255, 0.1);
            --accent-color: #f59e0b;
            --accent-hover: #fbbf24;
            --text-primary: #f8fafc;
            --text-secondary: #94a3b8;
            --shadow-custom: 0 25px 50px -12px rgba(0, 0, 0, 0.8);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Poppins', sans-serif;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            /* justify-content center bisa memotong konten jika layar pendek, 
               kita gunakan padding agar konten tetap aman saat di-scroll */
            justify-content: center; 
            background: var(--bg-gradient);
            padding: 40px 20px;
            /* Ubah hidden menjadi auto agar bisa di-scroll di HP pendek */
            overflow-y: auto; 
            overflow-x: hidden;
        }

        /* --- Splash Screen --- */
        #splash-screen {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: #020617;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 1000;
        }

        .welcome-text {
            font-size: clamp(1.8rem, 10vw, 3rem);
            font-weight: 600;
            color: var(--text-primary);
            letter-spacing: 12px;
            text-transform: uppercase;
            opacity: 0;
            animation: introText 1.5s cubic-bezier(0.23, 1, 0.32, 1) forwards;
        }

        .welcome-sub {
            font-size: clamp(0.8rem, 3vw, 1.1rem);
            color: var(--accent-color);
            margin-top: 15px;
            letter-spacing: 4px;
            opacity: 0;
            animation: fadeIn 1s 1.2s forwards;
        }

        @keyframes introText {
            0% { transform: translateY(30px); filter: blur(10px); opacity: 0; letter-spacing: 20px; }
            100% { transform: translateY(0); opacity: 1; filter: blur(0); letter-spacing: 8px; }
        }

        /* --- Main Content --- */
        .app-content {
            opacity: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            width: 100%;
            max-width: 400px;
            transform: scale(0.95);
            transition: all 0.8s cubic-bezier(0.34, 1.56, 0.64, 1);
        }

        .app-content.active {
            opacity: 1;
            transform: scale(1);
        }

        .calculator {
            width: 100%;
            background: var(--calc-bg);
            backdrop-filter: blur(30px);
            -webkit-backdrop-filter: blur(30px);
            border: 1px solid var(--glass-border);
            border-radius: 32px;
            padding: clamp(20px, 5vw, 30px);
            box-shadow: var(--shadow-custom);
            margin-bottom: 20px;
        }

        .display {
            width: 100%;
            margin-bottom: 25px;
            text-align: right;
            padding: 10px;
            min-height: 140px;
            display: flex;
            flex-direction: column;
            justify-content: flex-end;
            word-break: break-all;
        }

        .previous-operand {
            color: var(--text-secondary);
            font-size: clamp(0.9rem, 2.5vw, 1.1rem);
            margin-bottom: 8px;
            min-height: 1.5rem;
        }

        .current-operand {
            color: var(--text-primary);
            font-size: clamp(2.2rem, 10vw, 3.4rem);
            font-weight: 500;
            line-height: 1.1;
        }

        .buttons-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: clamp(10px, 3vw, 15px);
        }

        button {
            aspect-ratio: 1;
            border: none;
            border-radius: 20px;
            background: var(--btn-bg);
            color: var(--text-primary);
            font-size: clamp(1.1rem, 4vw, 1.4rem);
            font-weight: 500;
            cursor: pointer;
            transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
            display: flex;
            align-items: center;
            justify-content: center;
            outline: none;
            border: 1px solid transparent;
        }

        button:hover {
            background: var(--btn-hover);
            transform: translateY(-3px);
            border-color: rgba(255, 255, 255, 0.1);
        }

        button:active {
            transform: scale(0.9);
            background: rgba(255, 255, 255, 0.15);
        }

        .operator { background: rgba(245, 158, 11, 0.1); color: var(--accent-color); font-size: 1.6rem; }
        .equals { 
            background: var(--accent-color); 
            grid-column: span 2; 
            aspect-ratio: auto; 
            color: #020617; 
            font-weight: 600; 
            box-shadow: 0 10px 20px -5px rgba(245, 158, 11, 0.3); 
        }
        .equals:hover { background: var(--accent-hover); }
        .clear { color: #f87171; background: rgba(248, 113, 113, 0.08); }

        .developed-by {
            color: var(--text-secondary);
            font-size: 0.85rem;
            font-weight: 300;
            letter-spacing: 1px;
            opacity: 0.8;
            margin-top: 10px;
            padding-bottom: 20px;
        }

        .developed-by span { font-weight: 600; color: var(--accent-color); }

        @keyframes fadeOut { from { opacity: 1; } to { opacity: 0; visibility: hidden; } }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>

    <div id="splash-screen">
        <div class="welcome-text">diaww</div>
        <div class="welcome-sub">CALCULATOR</div>
    </div>

    <div class="app-content" id="main-content">
        <div class="calculator">
            <div class="display">
                <div id="previous-operand" class="previous-operand"></div>
                <div id="current-operand" class="current-operand">0</div>
            </div>
            
            <div class="buttons-grid">
                <button class="clear" onclick="handleInteraction('clear')">AC</button>
                <button onclick="handleInteraction('delete')">DEL</button>
                <button class="operator" onclick="handleInteraction('operator', '%')">%</button>
                <button class="operator" onclick="handleInteraction('operator', '÷')">÷</button>
                
                <button onclick="handleInteraction('number', '7')">7</button>
                <button onclick="handleInteraction('number', '8')">8</button>
                <button onclick="handleInteraction('number', '9')">9</button>
                <button class="operator" onclick="handleInteraction('operator', '×')">×</button>
                
                <button onclick="handleInteraction('number', '4')">4</button>
                <button onclick="handleInteraction('number', '5')">5</button>
                <button onclick="handleInteraction('number', '6')">6</button>
                <button class="operator" onclick="handleInteraction('operator', '-')">-</button>
                
                <button onclick="handleInteraction('number', '1')">1</button>
                <button onclick="handleInteraction('number', '2')">2</button>
                <button onclick="handleInteraction('number', '3')">3</button>
                <button class="operator" onclick="handleInteraction('operator', '+')">+</button>
                
                <button onclick="handleInteraction('number', '0')">0</button>
                <button onclick="handleInteraction('number', '.')">.</button>
                <button class="equals" onclick="handleInteraction('equal')">=</button>
            </div>
        </div>

        <div class="developed-by">Developed by <span>diaww</span></div>
    </div>

    <script>
        window.addEventListener('DOMContentLoaded', () => {
            setTimeout(() => {
                const splash = document.getElementById('splash-screen');
                splash.style.animation = 'fadeOut 0.8s ease forwards';
                document.getElementById('main-content').classList.add('active');
            }, 2800);
        });

        const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        function playClickSound() {
            if (audioCtx.state === 'suspended') audioCtx.resume();
            const oscillator = audioCtx.createOscillator();
            const gainNode = audioCtx.createGain();
            oscillator.type = 'sine';
            oscillator.frequency.setValueAtTime(400, audioCtx.currentTime);
            oscillator.frequency.exponentialRampToValueAtTime(80, audioCtx.currentTime + 0.1);
            gainNode.gain.setValueAtTime(0.1, audioCtx.currentTime);
            gainNode.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.1);
            oscillator.connect(gainNode);
            gainNode.connect(audioCtx.destination);
            oscillator.start();
            oscillator.stop(audioCtx.currentTime + 0.1);
        }

        const currentDisplay = document.getElementById('current-operand');
        const previousDisplay = document.getElementById('previous-operand');
        let currentInput = '0';
        let previousInput = '';
        let currentOperator = undefined;

        function handleInteraction(type, value) {
            playClickSound();
            switch(type) {
                case 'number':
                    if (value === '.' && currentInput.includes('.')) return;
                    if (currentInput.length > 15) return;
                    currentInput = (currentInput === '0' && value !== '.') ? value.toString() : currentInput + value.toString();
                    break;
                case 'operator':
                    if (currentInput === '' && previousInput === '') return;
                    if (previousInput !== '' && currentInput !== '') calculate();
                    currentOperator = value;
                    previousInput = currentInput || previousInput;
                    currentInput = '';
                    break;
                case 'clear':
                    currentInput = '0'; previousInput = ''; currentOperator = undefined;
                    break;
                case 'delete':
                    currentInput = currentInput.toString().slice(0, -1) || '0';
                    break;
                case 'equal':
                    calculate();
                    break;
            }
            updateDisplay();
        }

        function calculate() {
            let result;
            const prev = parseFloat(previousInput);
            const curr = parseFloat(currentInput);
            if (isNaN(prev) || isNaN(curr)) return;
            switch (currentOperator) {
                case '+': result = prev + curr; break;
                case '-': result = prev - curr; break;
                case '×': result = prev * curr; break;
                case '÷': result = curr === 0 ? 'Error' : prev / curr; break;
                case '%': result = prev % curr; break;
                default: return;
            }
            currentInput = typeof result === 'number' ? (Math.round(result * 1e8) / 1e8).toString() : result;
            currentOperator = undefined; previousInput = '';
        }

        function updateDisplay() {
            currentDisplay.innerText = formatDisplay(currentInput);
            previousDisplay.innerText = currentOperator ? `${formatDisplay(previousInput)} ${currentOperator}` : '';
            if (currentInput.length > 12) currentDisplay.style.fontSize = '1.8rem';
            else if (currentInput.length > 8) currentDisplay.style.fontSize = '2.4rem';
            else currentDisplay.style.fontSize = 'clamp(2.2rem, 10vw, 3.4rem)';
        }

        function formatDisplay(number) {
            if (number === 'Error') return 'Error';
            const parts = number.toString().split('.');
            let integerPart = !isNaN(parseFloat(parts[0])) ? parseFloat(parts[0]).toLocaleString('id-ID') : parts[0];
            return parts[1] != null ? `${integerPart},${parts[1]}` : integerPart;
        }

        window.addEventListener('keydown', e => {
            if (e.key >= 0 && e.key <= 9) handleInteraction('number', e.key);
            if (e.key === '.') handleInteraction('number', '.');
            if (e.key === 'Enter' || e.key === '=') { e.preventDefault(); handleInteraction('equal'); }
            if (e.key === 'Backspace') handleInteraction('delete');
            if (e.key === 'Escape') handleInteraction('clear');
            if (['+', '-', '*', '/'].includes(e.key)) {
                let opMap = {'*': '×', '/': '÷', '+': '+', '-': '-'};
                handleInteraction('operator', opMap[e.key]);
            }
        });
    </script>
</body>
</html>
